<!DOCTYPE html>
<html lang="tr">
<head>
    <script>
        (function() {
            const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || window.innerWidth <= 768;
            if (isMobile) { window.location.href = "mobildevriye.html"; }
        })();
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ŞİRKET Personel-Kontrol | Komuta Merkezi 2026</title>

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/responsive/2.5.0/css/responsive.dataTables.min.css">
	<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        :root {
            --bg-main: #0a0c10;
            --panel-bg: #12151c;
            --accent: #00d2ff;
            --accent-dark: #0080ff;
            --success: #00ff88;
            --warning: #ffcc00;
            --danger: #ff4d4d;
            --text-p: #ffffff;
            --text-s: #8b949e;
            --border: rgba(255, 255, 255, 0.08);
            --font-main: 'Montserrat', sans-serif;
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-main); }
        ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 10px; }

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }
        body { 
            background: var(--bg-main); color: var(--text-p); 
            font-family: var(--font-main); min-height: 100vh;
            background-image: radial-gradient(circle at top right, rgba(0, 210, 255, 0.05), transparent),
                              radial-gradient(circle at bottom left, rgba(0, 255, 136, 0.05), transparent);
        }

        nav {
            height: 80px; background: rgba(18, 21, 28, 0.8); backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border); display: flex; align-items: center;
            justify-content: space-between; padding: 0 40px; position: sticky; top: 0; z-index: 1000;
        }
        .nav-brand { display: flex; align-items: center; gap: 15px; }
        .nav-brand h1 { font-size: 1.4rem; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; color: var(--accent); }
        .nav-brand span { color: #fff; opacity: 0.5; font-weight: 300; }

        .btn-exit { 
            background: linear-gradient(45deg, #ff4d4d, #b30000); color: #fff;
            padding: 10px 25px; border-radius: 12px; border: none; font-weight: 700;
            cursor: pointer; transition: 0.3s; text-transform: uppercase; font-size: 0.8rem;
        }

        .app-container { max-width: 1600px; margin: 30px auto; padding: 0 30px; }

        .kpi-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .kpi-card { 
            background: var(--panel-bg); padding: 30px; border-radius: 20px;
            border: 1px solid var(--border); transition: 0.4s;
        }
        .kpi-card h3 { font-size: 0.75rem; color: var(--text-s); text-transform: uppercase; margin-bottom: 15px; }
        .kpi-card .value { font-size: 2.5rem; font-weight: 800; font-family: 'JetBrains Mono', monospace; }

        .filter-hub { 
            background: var(--panel-bg); padding: 20px 30px; border-radius: 24px;
            margin-bottom: 30px; display: flex; flex-wrap: wrap;
            gap: 20px; align-items: flex-end; border: 1px solid var(--border);
        }
        .input-wrap { display: flex; flex-direction: column; gap: 8px; flex: 1; min-width: 150px; }
        .input-wrap label { font-size: 0.7rem; font-weight: 700; color: var(--accent); text-transform: uppercase; }
        
        input, select {
            background: #0d1117; border: 1px solid #30363d; color: #fff;
            padding: 12px 15px; border-radius: 10px; font-size: 0.85rem;
        }
input[type="date"]::-webkit-calendar-picker-indicator {
    filter: invert(1); /* İkonu beyaz veya belirgin yapar */
    cursor: pointer;
}
        .btn-sync {
            background: linear-gradient(45deg, var(--accent), var(--accent-dark));
            color: #000; padding: 12px 20px; border-radius: 10px; border: none;
            font-weight: 800; cursor: pointer; transition: 0.3s; font-size: 0.8rem;
        }

        .table-container { 
            background: var(--panel-bg); padding: 25px; border-radius: 24px;
            border: 1px solid var(--border);
        }

        #detailDrawer, #excelModal {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -60%); 
            width: 90%; max-width: 600px; background: var(--panel-bg); z-index: 2000; 
            visibility: hidden; opacity: 0; transition: 0.4s;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8); border: 1px solid var(--accent);
            padding: 40px; border-radius: 30px;
        }
        #detailDrawer.active, #excelModal.active { visibility: visible; opacity: 1; transform: translate(-50%, -50%); }
        .drawer-overlay { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px);
            z-index: 1999; display: none;
        }

        #loadingLayer {
            position: fixed; inset: 0; background: var(--bg-main); z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        .loader-box { width: 50px; height: 50px; border: 4px solid #161b22; border-top-color: var(--accent); border-radius: 50%; animation: rot 0.8s infinite linear; }
        @keyframes rot { to { transform: rotate(360deg); } }

        .status-chip { padding: 5px 12px; border-radius: 20px; font-size: 0.7rem; font-weight: 800; }
        .chip-tam { background: rgba(0, 255, 136, 0.1); color: var(--success); }
        .chip-eksik { background: rgba(255, 77, 77, 0.1); color: var(--danger); }
        .time-label { font-family: 'JetBrains Mono'; font-size: 0.85rem; color: #fff; }
    </style>
</head>
<body>

<div id="loadingLayer">
    <div class="loader-box"></div>
</div>

<nav>
    <div class="nav-brand">
        <h1>ŞİRKET<span> Personel-Kontrol</span></h1>
    </div>
    <div style="display: flex; align-items: center; gap: 20px;">
        <div id="clock" style="font-family: 'JetBrains Mono'; color: var(--text-s);">00:00:00</div>
        <button class="btn-exit" onclick="location.href='sirket.html'">GERİ</button>
    </div>
</nav>

<div class="app-container">
    <div class="kpi-row">
        <div class="kpi-card"><h3>Toplam</h3><div class="value" id="kpi-total">0</div></div>
        <div class="kpi-card"><h3>Başarılı</h3><div class="value" id="kpi-ok" style="color: var(--success);">0</div></div>
        <div class="kpi-card"><h3>Sorunlu</h3><div class="value" id="kpi-err" style="color: var(--danger);">0</div></div>
        <div class="kpi-card"><h3>Ort. Süre</h3><div class="value" id="kpi-avg" style="color: var(--warning);">0 dk</div></div>
    </div>

    <div class="filter-hub">
        <div class="input-wrap">
            <label>TARİH SEÇİMİ</label>
            <input type="date" id="targetDate">
        </div>

        <button class="btn-sync" onclick="openExcelModal()" style="background: #1D6F42; color: #fff;">KAYIT OLUŞTUR (EXCEL)</button>
        <button class="btn-sync" id="tacticModeBtn">TAKTİK MOD: ALFA</button>

        <div class="input-wrap">
            <label>Personel</label>
            <select id="userSelector"><option value="">Tümü</option></select>
        </div>

        <div class="input-wrap">
            <label>Durum</label>
            <select id="statusSelector">
                <option value="">Tümü</option>
                <option value="Tam devriye">Tam</option>
                <option value="Yarım devriye">Yarım</option>
                <option value="Eksik">Eksik</option>
            </select>
        </div>
    </div>

    <div class="table-container">
        <table id="eliteTable" class="display responsive nowrap" style="width:100%">
            <thead>
                <tr>
                    <th>GÖREVLİ</th>
                    <th>TARİH</th>
                    <th>BAŞLANGIÇ</th>
                    <th>BİTİŞ</th>
                    <th>DURUM</th>
                    <th>SÜRE</th>
                    <th>NOKTA</th>
                    <th>AKSİYON</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<div class="drawer-overlay" id="overlay"></div>
<div id="excelModal">
    <h2 style="color:var(--accent); margin-bottom:20px;">Excel Raporu Oluştur</h2>
    <div style="display: grid; gap: 20px; margin-bottom: 30px;">
        <div class="input-wrap">
            <label>BAŞLANGIÇ TARİHİ</label>
            <input type="date" id="excelStart">
        </div>
        <div class="input-wrap">
            <label>BİTİŞ TARİHİ</label>
            <input type="date" id="excelEnd">
        </div>
    </div>
    <div style="display: flex; gap: 10px;">
        <button class="btn-sync" id="runExcelBtn" style="flex:1">EVRAK KAYDI AL</button>
        <button class="btn-sync" onclick="closeAllModals()" style="background:#333; color:#fff;">İPTAL</button>
    </div>
</div>

<div id="detailDrawer">
    <div id="drawerContent"></div>
    <button class="btn-sync" onclick="closeAllModals()" style="margin-top:20px; width:100%; background:#333; color:#fff;">KAPAT</button>
</div>

<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>

<script type="module">
import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";
import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-database.js";

const fbConfig = {
     apiKey: "AIzaSyDCJWz80wWlzNhaM2Qnw_e5UkQoc8DoJaU",
  authDomain: "merkez-14bf8.firebaseapp.com",
  projectId: "merkez-14bf8",
  storageBucket: "merkez-14bf8.firebasestorage.app",
  messagingSenderId: "512943111807",
  appId: "1:512943111807:web:675c769c7ede48216e494a",
  measurementId: "G-BYS8FPKY7H"
};

const mApp = initializeApp(fbConfig, "merkez");
const sId = sessionStorage.getItem("selectedSiteId");
const siteSnap = await get(ref(getDatabase(mApp), "sites/" + sId + "/config"));
const siteDb = getDatabase(getApps().find(a=>a.name===sId) || initializeApp(siteSnap.val(), sId));
const siteBilgiSnap = await get(ref(getDatabase(mApp), "sites/" + sId));
const gercekProjeAdi = siteBilgiSnap.val()?.siteName || sId;

let rawData = [];
const table = $('#eliteTable').DataTable({
    order: [[2, 'desc']], 
    pageLength: 25, // İlk sayfada 25 satır gösterir
    language: { url: '//cdn.datatables.net/plug-ins/1.13.6/i18n/tr.json' },
    dom: 'rtip'
});

function calculateDuration(start, end) {
    if (!start || !end || start === "--") return "0 dk";
    try {
        const s = start.split(':'), e = end.split(':');
        let sMin = parseInt(s[0])*60 + parseInt(s[1]), eMin = parseInt(e[0])*60 + parseInt(e[1]);
        if (eMin < sMin) eMin += 1440;
        const d = eMin - sMin;
        return d > 60 ? `${Math.floor(d/60)} sa ${d%60} dk` : `${d} dk`;
    } catch { return "0 dk"; }
}

async function fetchDailyData(dateVal) {
    $('#loadingLayer').fadeIn(100);
    rawData = [];
    const userPool = new Set();
    try {
        const snap = await get(ref(siteDb, `devriyeHistory/${dateVal}`));
        if(snap.exists()){
            const data = snap.val();
            Object.keys(data).forEach(pAd => {
                Object.keys(data[pAd]).forEach(id => {
                    let item = data[pAd][id];
                    item.pName = item.user || pAd;
                    item.pDate = item.displayDate || dateVal;
                    item.duration = calculateDuration(item.start, item.end);
                    rawData.push(item);
                    userPool.add(item.pName);
                });
            });
        }
        
        rawData.sort((a, b) => {
            if (!a.start) return 1;
            if (!b.start) return -1;
            return b.start.localeCompare(a.start);
        });

        renderUI(rawData, userPool);
    } catch(e) { console.error(e); }
    $('#loadingLayer').fadeOut(300);
}

function renderUI(data, users) {
    table.clear();
    let cTam = 0, cErr = 0, totalMin = 0;
    data.forEach((row, i) => {
        const isTam = row.status?.toLowerCase().includes('tam');
        if(isTam) cTam++; else cErr++;
        totalMin += parseInt(row.duration) || 0;

        table.row.add([
            `<b>${row.pName}</b>`,
            row.pDate,
            `<span class="time-label">${row.start || '--:--'}</span>`,
            `<span class="time-label">${row.end || '--:--'}</span>`,
            `<span class="status-chip ${isTam?'chip-tam':'chip-eksik'}">${row.status}</span>`,
            `<b style="color:var(--accent)">${row.duration}</b>`,
            `<b>${row.points?.length || 0}</b> Nokta`,
            `<button class="btn-sync" style="padding:5px 10px;" onclick="openDetail(${i})">İncele</button>`
        ]);
    });
    table.draw();
    $('#kpi-total').text(data.length);
    $('#kpi-ok').text(cTam);
    $('#kpi-err').text(cErr);
    $('#kpi-avg').text(data.length ? Math.round(totalMin/data.length)+" dk" : "0 dk");

    let uHtml = '<option value="">Tümü</option>';
    Array.from(users).sort().forEach(u => uHtml += `<option value="${u}">${u}</option>`);
    $('#userSelector').html(uHtml);
}

window.openExcelModal = () => { 
    const today = new Date().toISOString().split('T')[0];
    $('#excelStart, #excelEnd').val(today);
    $('#excelModal').addClass('active'); 
    $('#overlay').fadeIn(); 
};

window.closeAllModals = () => { 
    $('#excelModal, #detailDrawer').removeClass('active'); 
    $('#overlay').fadeOut(); 
};

window.openDetail = (idx) => {
    const d = rawData[idx];
    $('#drawerContent').html(`
        <h3 style="color:var(--accent)">${d.pName} - ${d.pDate}</h3>
        <p><b>Başlangıç:</b> ${d.start || '--:--'} | <b>Bitiş:</b> ${d.end || '--:--'}</p>
        <p>Durum: ${d.status} | Süre: ${d.duration}</p>
        <hr style="margin:15px 0; opacity:0.1">
        <div style="max-height:300px; overflow:auto;">
            ${d.points?.map(p => `<div style="padding:10px; border-bottom:1px solid #222;">[${p.time}] ${p.name}</div>`).join('') || 'Nokta kaydı yok'}
        </div>
    `);
    $('#detailDrawer').addClass('active');
    $('#overlay').fadeIn();
};

$(document).ready(() => {
    const today = new Date().toISOString().split('T')[0];
    $('#targetDate').val(today);
    fetchDailyData(today);
    setInterval(() => $('#clock').text(new Date().toLocaleTimeString('tr-TR')), 1000);
});

$('#targetDate').on('change', function() { fetchDailyData(this.value); });
$('#userSelector, #statusSelector').on('change', () => {
    table.column(0).search($('#userSelector').val()).column(4).search($('#statusSelector').val()).draw();
});

$('#runExcelBtn').on('click', async () => {
    const s = $('#excelStart').val(), e = $('#excelEnd').val();
    if(!s || !e) return alert("Tarih seçin!");
    
    $('#loadingLayer').fadeIn();
    let excelRows = [];
    let cur = new Date(s), last = new Date(e);

    while(cur <= last) {
        let dStr = cur.toISOString().split('T')[0];
        const snap = await get(ref(siteDb, `devriyeHistory/${dStr}`));
        if(snap.exists()) {
            const day = snap.val();
            Object.keys(day).forEach(p => {
                Object.keys(day[p]).forEach(id => {
                    const it = day[p][id];
                    const noktaDetay = it.points ? it.points.map(pt => `[${pt.time}] ${pt.name}`).join(' | ') : "Kayıt Yok";
                    
                    excelRows.push({
                        "GÜVENLİK GÖREVLİSİ": (it.user || p).toUpperCase(),
                        "DEVRİYE TARİHİ": it.displayDate || dStr,
                        "DEVRİYE DURUMU": it.status || "Belirsiz",
                        "DEVRİYE BAŞLANGIÇ SAATİ": it.start || "--:--",
                        "DEVRİYE BİTİŞ SAATİ": it.end || "--:--",
                        "DEVRİYE SÜRESİ": calculateDuration(it.start, it.end),
                        "OKUTULAN NOKTA SAYISI": it.points ? it.points.length : 0,
                        "OKUTULAN NOKTA DETAYLARI": noktaDetay
                    });
                });
            });
        }
        cur.setDate(cur.getDate() + 1);
    }

    if(excelRows.length > 0) {
        const ws = XLSX.utils.json_to_sheet(excelRows);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Operasyon Raporu");
        ws["!cols"] = [
            {wch:25}, {wch:15}, {wch:15}, {wch:20}, {wch:20}, {wch:15}, {wch:20}, {wch:100}
        ];
        XLSX.writeFile(wb, `${gercekProjeAdi.replace(/\s+/g, '_')}_DETAYLI_DEVRİYE_RAPORU.xlsx`);
    } else { alert("Bu tarihler arasında kayıt bulunamadı!"); }
    
    $('#loadingLayer').fadeOut();
    closeAllModals();
});

$('#overlay').on('click', closeAllModals);

const tactics = ['ALFA', 'BETA', 'GAMA', 'DELTA'];
let tIdx = 0;
$('#tacticModeBtn').on('click', function() {
    tIdx = (tIdx + 1) % tactics.length;
    $(this).text('TAKTİK MOD: ' + tactics[tIdx]);
    const colors = ['#00d2ff', '#00ff88', '#ffcc00', '#ff4d4d'];
    document.documentElement.style.setProperty('--accent', colors[tIdx]);
});
</script>
</body>
</html>
