<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CGA | BLACK OPS COMMAND</title>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Inter:wght@300;500;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>

    <style>
        :root { 
            --bg-deep: #08090a; --panel-bg: #111214; --accent: #f59e0b; 
            --text-dim: #94a3b8; --text-bright: #f8fafc; --border-color: #26292e;
            --card-bg: #16181b; --danger: #ef4444;
        }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg-deep); color: var(--text-bright); padding: 15px; }
        .top-header { display: flex; justify-content: space-between; align-items: center; padding: 25px; background: var(--panel-bg); border: 1px solid var(--border-color); border-radius: 4px; margin-bottom: 20px; }
        .main-logo { font-family: 'Syncopate', sans-serif; font-weight: 700; letter-spacing: 6px; font-size: 1.4rem; color: #fff; }
        .main-logo span { color: var(--accent); font-size: 0.7rem; letter-spacing: 2px; display: block; opacity: 0.6; }
        .calendar-unit { background: var(--panel-bg); border: 1px solid var(--border-color); padding: 20px; margin-bottom: 20px; }
        .unit-title { font-size: 10px; font-weight: 700; color: var(--text-dim); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 15px; display: block; }
        .scroll-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 20px; }
        .nav-btn { padding: 12px 20px; background: transparent; border: 1px solid var(--border-color); color: var(--text-dim); border-radius: 2px; cursor: pointer; font-size: 11px; font-weight: 700; transition: 0.2s; text-transform: uppercase; font-family: 'Syncopate', sans-serif; }
        .nav-btn:hover { border-color: var(--accent); color: var(--accent); }
        .nav-btn.active { background: var(--accent); color: #000; border-color: var(--accent); }
        .day-sq { width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; font-family: 'JetBrains Mono'; font-size: 14px; }
        .filter-bar { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .dark-select { background: #000; border: 1px solid var(--border-color); color: #fff; padding: 15px; border-radius: 4px; font-size: 13px; outline: none; }
        .log-card { background: var(--card-bg); border: 1px solid var(--border-color); padding: 30px; margin-bottom: 15px; position: relative; }
        .log-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 2px; background: var(--accent); opacity: 0.4; }
        .log-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .log-user { font-family: 'Syncopate'; font-size: 12px; color: #fff; }
        .log-tag { border: 1px solid var(--accent); color: var(--accent); font-size: 9px; padding: 3px 10px; font-weight: 700; }
        .log-body { color: #cbd5e1; font-size: 15px; line-height: 1.8; margin-bottom: 25px; }
        .log-meta { display: grid; grid-template-columns: 1fr 1fr; font-size: 11px; color: var(--text-dim); border-top: 1px solid #222; padding-top: 15px; }
        .log-meta span b { color: var(--accent); margin-right: 5px; }
        .img-preview { width: 140px; border-radius: 2px; margin-top: 20px; cursor: pointer; opacity: 0.8; border: 1px solid #333; }
        .pdf-btn { background: transparent; color: #fff; border: 1px solid #fff; padding: 15px; width: 100%; font-weight: 700; margin-top: 25px; cursor: pointer; text-transform: uppercase; font-size: 11px; font-family: 'Syncopate'; transition: 0.3s; }
        .pdf-btn:hover { background: #fff; color: #000; }
        #preloader { position: fixed; inset: 0; background: #000; z-index: 10000; display: flex; align-items: center; justify-content: center; }
        .bar-load { width: 50px; height: 2px; background: var(--accent); animation: pulse 1s infinite alternate; }
        @keyframes pulse { from { width: 10px; opacity: 0.2; } to { width: 100px; opacity: 1; } }
        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 10001; justify-content: center; align-items: center; padding: 40px; }
        .overlay img { max-width: 100%; max-height: 100%; border: 1px solid var(--accent); }
    </style>
</head>
<body>

<div id="preloader"><div class="bar-load"></div></div>
<div id="zoomBox" class="overlay"><img id="zoomImg"></div>

<div class="top-header">
    <div class="main-logo">CGA<span>COMMAND CENTER</span></div>
    <button onclick="window.location.href='sirket.html'" style="background:transparent; border:none; color:var(--danger); cursor:pointer; font-weight:700; font-size:11px; font-family:'Syncopate'">[ LOGOUT ]</button>
</div>

<div class="calendar-unit">
    <span class="unit-title">ARŞİV / AYLAR</span>
    <div class="scroll-row" id="monthWrap"></div>
    <span class="unit-title">ARŞİV / GÜNLER</span>
    <div class="scroll-row" id="dayWrap"></div>
</div>

<div class="filter-bar">
    <select id="uSelect" class="dark-select"><option value="">TÜM PERSONEL</option></select>
    <select id="tSelect" class="dark-select">
        <option value="">TÜM OLAYLAR</option>
        <option value="Kapı açık">KAPI AÇIK</option>
        <option value="Hırsızlık">HIRSİZLIK</option>
        <option value="Yangın">YANGIN</option>
        <option value="Sistemsel hata">SİSTEMSEL HATA</option>
        <option value="Eksik devriye">EKSİK DEVRİYE</option>
    </select>
</div>

<div id="logContainer"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";
import { getDatabase, ref, onValue, get, off } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-database.js";

async function bootCommand(){
    const config = {
        apiKey: "AIzaSyDCJWz80wWlzNhaM2Qnw_e5UkQoc8DoJaU",
        authDomain: "merkez-14bf8.firebaseapp.com",
        projectId: "merkez-14bf8",
        storageBucket: "merkez-14bf8.firebasestorage.app",
        messagingSenderId: "512943111807",
        appId: "1:512943111807:web:675c769c7ede48216e494a"
    };

    const mApp = initializeApp(config, "m");
    const sId = sessionStorage.getItem("selectedSiteId");
    if(!sId) return window.location.href="sirket.html";

    const sSnap = await get(ref(getDatabase(mApp), `sites/${sId}`));
    const sData = sSnap.val();
    const db = getDatabase(initializeApp(sData.config, sId));

    const mW = document.getElementById('monthWrap');
    const dW = document.getElementById('dayWrap');
    const container = document.getElementById('logContainer');
    const uS = document.getElementById('uSelect');
    const tS = document.getElementById('tSelect');

    const monNames = ["OCAK", "ŞUBAT", "MART", "NİSAN", "MAYIS", "HAZİRAN", "TEMMUZ", "AĞUSTOS", "EYLÜL", "EKİM", "KASIM", "ARALIK"];
    let dbIdx = {};
    let activeRef = null;
    let dataList = [];

    function fixT(s) {
        if (!s) return "";
        const m = {'ç':'c','Ç':'C','ğ':'g','Ğ':'G','ı':'i','İ':'I','ö':'o','Ö':'O','ş':'s','Ş':'S','ü':'u','Ü':'U'};
        return s.toString().replace(/[çÇğĞıİöÖşŞüÜ]/g, x => m[x]).toUpperCase();
    }

    // --- YEREL KANDIRMA MOTORU (BLOB TO BUFFER) ---
    async function getSafeBuffer(url) {
        try {
            // Sunucuyu kandırmak için 'cache' olayını bypass ediyoruz
            const response = await fetch(url, { mode: 'cors' });
            if (!response.ok) throw new Error("Görsel sunucudan alınamadı");
            const blob = await response.blob();
            return await blob.arrayBuffer();
        } catch (e) {
            console.error("Yerel kandırma hatası:", e);
            return null;
        }
    }

    // --- PDF BASMA MOTORU ---
    async function printPDF(o) {
        try {
            console.log("PDF Motoru: Yerel Kandırma Devrede...");
            const { PDFDocument } = PDFLib;
            
            const res = await fetch('sablon.pdf?v=' + Date.now());
            if (!res.ok) throw new Error("sablon.pdf bulunamadı!");
            
            const pdfBytes = await res.arrayBuffer();
            const pdfDoc = await PDFDocument.load(pdfBytes);
            const form = pdfDoc.getForm();
            const pages = pdfDoc.getPages();

            const fieldMap = {
                'P1': o.raporNo, 'Z1': o.raporNo, 'SIRA': o.raporNo,
                'P2': o.date, 'Z3': o.date,
                'G1': o.location, 'T1': o.tespitYeri || o.location,
                'T2': o.konu, 'T4': o.time,
                'A1': o.user, 'A3': "GUVENLIK GOREVLISI",
                'Y1': o.desc
            };

            Object.entries(fieldMap).forEach(([key, val]) => {
                try {
                    const f = form.getTextField(key);
                    if (f) f.setText(fixT(val));
                } catch (e) {}
            });

            // GÖRSELİ YERELDEN ALIP GÖMME
            if (o.photoData) {
                const imgBuffer = await getSafeBuffer(o.photoData);
                if (imgBuffer && imgBuffer.byteLength > 0) {
                    let jpgImage;
                    // PNG/JPG ayrımı yaparak gömme
                    if (o.photoData.toLowerCase().includes(".png")) {
                        jpgImage = await pdfDoc.embedPng(imgBuffer);
                    } else {
                        jpgImage = await pdfDoc.embedJpg(imgBuffer);
                    }

                    const photoField = form.getTextField('F1');
                    if (photoField) {
                        const rect = photoField.acroField.getWidgets()[0].getRectangle();
                        pages[0].drawImage(jpgImage, {
                            x: rect.x, y: rect.y,
                            width: rect.width, height: rect.height
                        });
                        photoField.setText("");
                    }
                }
            }

            form.flatten();
            const finalPdf = await pdfDoc.save();
            const downloadBlob = new Blob([finalPdf], { type: 'application/pdf' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(downloadBlob);
            link.download = `CGA_${o.raporNo}.pdf`;
            link.click();
            
        } catch (error) {
            alert("Sistem Hatası (DataView Sorunu): " + error.message);
        }
    }

    const raw = await get(ref(db, `securityEvents`));
    if(raw.exists()) dbIdx = raw.val();

    const activeMonths = [...new Set(Object.keys(dbIdx).map(k => k.split('-')[1]))].sort();
    
    activeMonths.forEach(m => {
        const b = document.createElement('button');
        b.className = 'nav-btn';
        b.innerText = monNames[parseInt(m)-1];
        b.onclick = () => {
            document.querySelectorAll('#monthWrap .nav-btn').forEach(x => x.classList.remove('active'));
            b.classList.add('active');
            renderDays(m);
        };
        mW.appendChild(b);
        if(parseInt(m) === (new Date().getMonth()+1)) b.click();
    });

    function renderDays(m) {
        dW.innerHTML = '';
        const days = Object.keys(dbIdx).filter(k => k.split('-')[1] === m).map(k => k.split('-')[0]).sort((a,b)=>a-b);
        days.forEach(d => {
            const b = document.createElement('button');
            b.className = 'nav-btn day-sq';
            b.innerText = d;
            b.onclick = () => {
                document.querySelectorAll('#dayWrap .nav-btn').forEach(x => x.classList.remove('active'));
                b.classList.add('active');
                loadData(`${d}-${m}-2026`);
            };
            dW.appendChild(b);
            if(parseInt(d) === new Date().getDate() && parseInt(m) === (new Date().getMonth()+1)) b.click();
        });
        document.getElementById('preloader').style.display = 'none';
    }

    function loadData(p) {
        if(activeRef) off(activeRef);
        activeRef = ref(db, `securityEvents/${p}`);
        onValue(activeRef, s => {
            dataList = [];
            if(s.exists()){
                const d = s.val();
                for(let u in d) for(let k in d[u]) dataList.push({...d[u][k], user: u, key: k});
            }
            const currU = uS.value;
            uS.innerHTML = '<option value="">TÜM PERSONEL</option>' + [...new Set(dataList.map(x => x.user))].map(u => `<option value="${u}">${u}</option>`).join('');
            uS.value = currU;
            draw();
        });
    }

    function draw() {
        container.innerHTML = '';
        let fil = dataList.filter(l => (!uS.value || l.user === uS.value) && (!tS.value || l.konu === tS.value));
        if(fil.length === 0) {
            container.innerHTML = '<div style="text-align:center; padding:50px; color:var(--text-dim);">[ KAYIT YOK ]</div>';
            return;
        }
        fil.sort((a,b) => (b.timestamp || 0) - (a.timestamp || 0)).forEach(l => {
            const div = document.createElement('div');
            div.className = 'log-card';
            div.innerHTML = `
                <div class="log-header">
                    <span class="log-user">${l.user}</span>
                    <span class="log-tag">${l.konu.toUpperCase()}</span>
                </div>
                <div class="log-body">${l.desc}</div>
                <div class="log-meta">
                    <span><b>YER:</b> ${l.location}</span>
                    <span><b>SAAT:</b> ${l.time}</span>
                </div>
                ${l.photoData ? `<img src="${l.photoData}" crossOrigin="anonymous" class="img-preview" onclick="window.zoom('${l.photoData}')">` : ''}
                <button class="pdf-btn">PDF RAPORU AL</button>
            `;
            div.querySelector('.pdf-btn').onclick = () => printPDF(l);
            container.appendChild(div);
        });
    }

    window.zoom = (url) => { document.getElementById('zoomImg').src = url; document.getElementById('zoomBox').style.display = 'flex'; };
    document.getElementById('zoomBox').onclick = () => document.getElementById('zoomBox').style.display = 'none';
    uS.onchange = draw;
    tS.onchange = draw;
}

bootCommand();
</script>
</body>
</html>
